events {}

http {

    server {

        listen 80;

        #################################################
        # Common CORS
        #################################################

        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Vary Origin always;


        #################################################
        # OPTIONS HANDLE
        #################################################

        if ($request_method = OPTIONS) {
            return 204;
        }


        #################################################
        # AUTH CHECK
        #################################################

        location = /auth {

            internal;

            proxy_pass http://user-service:8001/users/verify/;

            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            proxy_set_header Authorization $http_authorization;

            proxy_set_header Host $host;
        }


        #################################################
        # USER SERVICE
        #################################################

        location /api/users/ {

            proxy_pass http://user-service:8001/users/;

            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }


        #################################################
        # PRODUCT SERVICE
        #################################################

        location /api/products/ {

            auth_request /auth;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;

            proxy_set_header Authorization $http_authorization;

            proxy_pass http://product-service:8002/products/;

            proxy_set_header Host $host;
        }


        #################################################
        # ORDER SERVICE
        #################################################

        location /api/orders/ {

            auth_request /auth;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;

            proxy_set_header Authorization $http_authorization;

            proxy_pass http://order-service:8003/orders/;

            proxy_set_header Host $host;
        }


        #################################################
        # CHAT API
        #################################################

        location /api/chat/ {

            auth_request /auth;

            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_email $upstream_http_x_user_email;
            auth_request_set $user_role $upstream_http_x_user_role;

            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Email $user_email;
            proxy_set_header X-User-Role $user_role;

            proxy_set_header Authorization $http_authorization;

            proxy_pass http://chat-service:8004/chat/;

            proxy_set_header Host $host;
        }


        #################################################
        # CHAT WEBSOCKET
        #################################################

        location /ws/chat/ {

            auth_request /auth;

            proxy_set_header Authorization $http_authorization;

            proxy_pass http://chat-service:8004/ws/chat/;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
        }


        #################################################
        # DASHBOARD WEBSOCKET
        #################################################

        location /ws/dashboard/ {

            auth_request /auth;

            proxy_set_header Authorization $http_authorization;

            proxy_pass http://chat-service:8004/ws/dashboard/;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
        }

    }

}