version: "3.9"

services:

  # ==========================
  # USER DATABASE (MySQL)
  # ==========================
  user-db:
    image: mysql:8.0
    container_name: user-db
    restart: always
    environment:
      MYSQL_DATABASE: user_db
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: password123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    volumes:
      - user_db_data:/var/lib/mysql

  # ==========================
  # USER SERVICE
  # ==========================
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "8001:8001"
    volumes:
      - ./user-service:/app
    depends_on:
      - user-db

  # ==========================
  # PRODUCT DATABASE (PostgreSQL)
  # ==========================
  product-db:
    image: postgres:17
    container_name: product-db
    restart: always
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - product_db_data:/var/lib/postgresql/data

  # ==========================
  # PRODUCT SERVICE
  # ==========================
  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: product-service
    ports:
      - "8002:8002"
    volumes:
      - ./product-service:/app
    depends_on:
      - product-db

  # ==========================
  # ORDER DATABASE (MySQL)
  # ==========================
  order-db:
    image: mysql:8.0
    container_name: order-db
    restart: always
    environment:
      MYSQL_DATABASE: order_db
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: password123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3308:3306"
    volumes:
      - order_db_data:/var/lib/mysql

  # ==========================
  # ORDER SERVICE
  # ==========================
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    ports:
      - "8003:8003"
    volumes:
      - ./order-service:/app
    depends_on:
      - order-db

  # ==========================
  # NGINX API GATEWAY
  # ==========================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "8080:80"
    depends_on:
      - user-service
      - product-service
      - order-service

volumes:
  user_db_data:
  product_db_data:
  order_db_data: